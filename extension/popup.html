<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <title>Applie</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Plain placeholder styling — designer will redo this. */
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        color: #1c1917;
        background: #ffffff;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .logo {
        width: 28px;
        height: 28px;
        border-radius: 5px;
      }
      .brand {
        font-family: 'Allura', cursive;
        font-size: 24px;
        line-height: 1;
      }

      label {
        display: block;
        font-size: 12px;
        color: #78716c;
        margin: 8px 0 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1.5px solid #e7e5e4;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: #f59e0b;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #f59e0b;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 12px;
      }
      button:hover {
        background: #d97706;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .ghost {
        background: transparent;
        color: #78716c;
        margin-top: 8px;
      }
      .ghost:hover {
        background: transparent;
        color: #1c1917;
        text-decoration: underline;
      }

      .small {
        font-size: 12px;
        color: #78716c;
      }
      .error {
        color: #dc2626;
        font-size: 12px;
        margin-top: 8px;
      }
      .success {
        color: #16a34a;
        font-size: 12px;
        margin-top: 8px;
      }
      .hidden {
        display: none;
      }
      .row-between {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .page-title {
        font-size: 13px;
        font-weight: 500;
        margin: 0 0 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <img class="logo" src="icons/icon-128.png" alt="" />
      <span class="brand">Applie</span>
    </div>

    <!-- Signed-out view -->
    <div id="auth-view" class="hidden">
      <label for="email">Email</label>
      <input id="email" type="email" />
      <label for="password">Password</label>
      <input id="password" type="password" />
      <div id="auth-error" class="error hidden"></div>
      <button id="sign-in-btn">Sign in</button>
    </div>

    <!-- Signed-in view -->
    <div id="save-view" class="hidden">
      <div class="row-between">
        <span class="small">Signed in as <strong id="user-email"></strong></span>
      </div>
      <p class="page-title" id="page-title">Reading page…</p>
      <p class="small" id="page-url"></p>
      <button id="save-btn">Save to Applie</button>
      <div id="save-message" class="success hidden"></div>
      <div id="save-error" class="error hidden"></div>
      <button id="sign-out-btn" class="ghost">Sign out</button>
    </div>

    <!-- Loading view -->
    <div id="loading-view" class="small">Loading…</div>

    <!-- Bundled locally (Manifest V3 blocks CDN scripts at runtime). -->
    <script src="lib/supabase.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
